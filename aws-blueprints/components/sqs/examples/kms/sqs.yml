---
# Exemplo: Fila SQS com criptografia via KMS
#
# Usa uma chave KMS gerenciada pelo cliente (CMK) no lugar da criptografia
# padrão gerenciada pelo SQS. Indicado para workloads com requisitos de
# compliance que exigem controle sobre o ciclo de vida das chaves.
#
# Nota: ao definir kms_master_key_id, o sqs_managed_sse_enabled é ignorado
# automaticamente pelo módulo — não é necessário desabilitá-lo manualmente.

apiVersion: aws/v1
kind: sqs
version: "CHANGEME"

spec:
  name: example-sqs
  # Chave KMS usada para criptografar as mensagens da fila
  kms_master_key_id: arn:aws:kms:us-east-1:123456789012:key/mrk-abc123
  sns_access_arns:
    - arn:aws:sns:us-east-1:123456789012:example-sns-topic
